name: 📺 UPSC Daily YouTube Upload

on:
  schedule:
    - cron: '30 1 * * *'   # 7:00 AM IST = 1:30 AM UTC daily
  workflow_dispatch:        # manual trigger from GitHub UI → Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📂 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: 🤖 Cache Kokoro model (avoid re-download daily)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: kokoro-model-v1

      - name: 🎬 Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu --fix-missing

      - name: 📥 Install Python dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run pipeline
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:        ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY:       ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python pipeline.py
